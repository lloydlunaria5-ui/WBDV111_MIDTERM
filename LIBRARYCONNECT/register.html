<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - LibraryConnect</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo" onclick="window.location.href='index.html'">LibraryConnect</div>
        <nav>
            <ul>
                <li><a href="index.html" class="nav-btn">🏠 Search</a></li>
                <li><a href="members.html" class="nav-btn">👥 Members</a></li>
                <li><a href="loans.html" class="nav-btn">📋 Loans</a></li>
                <li><a href="overdue.html" class="nav-btn">⚠️ Overdue</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="card-icon">📝</div>
                <h2>Join LibraryConnect</h2>
                <p>Create your free library account today.</p>
                <form id="register-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="Enter your phone">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" placeholder="Create a password" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" placeholder="Confirm your password" required>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the Terms and Privacy Policy</label>
                    </div>
                    <button type="submit" class="card-btn full">📝 Create Account</button>
                </form>
                <p class="auth-link">Already a member? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p class="footer-text">© 2024 LibraryConnect - Modern Library Management</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
