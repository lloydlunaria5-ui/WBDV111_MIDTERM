<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Vista | Our Rooms</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Luna<span>Vista</span></div>
        <div class="nav-main">
            <div class="nav-links">
                <a href="index.html" class="btn-primary">Home</a>
                <a href="rooms.html" class="btn-primary">Rooms</a>
                <a href="summary.html" class="btn-primary">Bookings (<span id="booking-count">0</span>)</a>
                <a href="login.html" class="btn-secondary">Login</a>
            </div>
        </div>
    </nav>

    <div id="booking-modal" class="modal-overlay">
        <div class="container" style="max-width: 450px; text-align: center;">
            <h2 id="modal-title">Book This Room?</h2>
            <p id="modal-msg"></p>
            <div id="nights-box" style="display:none; margin: 1.5rem 0;">
                <label>Nights: </label>
                <input type="number" id="stay-nights" value="1" min="1" max="30" style="width: 80px; padding: 0.5rem;">
            </div>
            <div id="guests-box" style="display:none; margin: 1.5rem 0;">
                <label>Guests: </label>
                <input type="number" id="stay-guests" value="2" min="1" max="6" style="width: 80px; padding: 0.5rem;">
            </div>
            <div style="display: flex; gap: 1rem;">
                <button id="modal-yes" class="btn-primary" style="flex:1;">Book Now</button>
                <button id="modal-no" class="btn-secondary" style="flex:1;">Cancel</button>
            </div>
        </div>
    </div>

    <div class="container">
        <section id="rooms" class="page active">
            <h1>🌙 Our Accommodations</h1>
            <input type="text" class="search-bar" placeholder="Search rooms..." id="room-search">
            
            <div class="filter-btns" id="filter-btns"></div>
            
            <div class="grid" id="rooms-grid"></div>
        </section>
    </div>

    <div id="toast"></div>
    <script src="script.js"></script>
    <script>
        document.getElementById('room-search')?.addEventListener('input', (e) => {
            renderRooms(e.target.value.toLowerCase());
        });
        
        const types = [...new Set(roomData.map(r => r.type))];
        const filterContainer = document.getElementById('filter-btns');
        if (filterContainer) {
            filterContainer.innerHTML = '<button class="filter-btn btn-secondary active" data-type="">All</button>' +
                types.map(type => `<button class="filter-btn btn-secondary" data-type="${type}">${type}</button>`).join('');
        }
        
        document.querySelectorAll('.filter-btn')?.forEach(btn => {
            btn.style.cssText = 'padding:0.5rem 1rem;border:1px solid var(--accent);border-radius:20px;font-size:0.9rem;';
        });
    </script>
</body>
</html>
