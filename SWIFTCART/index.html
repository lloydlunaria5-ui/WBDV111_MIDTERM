<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftCart - Online Store</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fffaf7;
      padding: 20px;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px 20px;
      margin-bottom: 20px;
      background: #fff;
      gap: 20px;
    }

    .logo {
      color: #ff6600;
      font-size: 22px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .search {
      flex: 1;
      max-width: 400px;
      margin: 0 auto;
      padding: 8px 20px;
      border: 1px solid #ddd;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
    }

    .cart {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #333;
      flex-shrink: 0;
    }

    .cart-icon {
      width: 20px;
      height: 20px;
    }

    .cart-count {
      background: #ff6600;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
    }

    /* Main Layout */
    .main {
      display: flex;
      gap: 15px;
    }

    /* Products Grid */
    .products {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    /* Product Card */
    .product {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 2px;
      height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 12px;
    }

    .product-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .price {
      font-weight: 700;
      color: #333;
      font-size: 15px;
    }

    .add-btn {
      background: #ff6600;
      color: white;
      border: none;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 2px;
      cursor: pointer;
    }

    .add-btn:hover {
      background: #e55a00;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .box {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 2px;
      min-height: 50px;
    }

    .categories {
      padding: 15px;
      min-height: 150px;
    }

    .categories h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 15px;
      color: #000;
    }

    .categories p {
      color: #666;
      font-size: 14px;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .products {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 800px) {
      .products {
        grid-template-columns: repeat(2, 1fr);
      }
      .sidebar {
        width: 180px;
      }
    }

    @media (max-width: 600px) {
      .main {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
      }
      .box {
        flex: 1;
        min-width: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">swiftcart</div>
      <input type="text" class="search" placeholder="search bar" id="searchInput">
      <div class="cart">
        <svg class="cart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span>Cart</span>
        <span class="cart-count" id="cartCount">0</span>
      </div>
    </header>

    <!-- Main -->
    <div class="main">
      <!-- Products -->
      <div class="products" id="products"></div>

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="box categories">
          <h3>Categories</h3>
          <p>Accessories</p>
          <p>Peripherals</p>
        </div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
      </aside>
    </div>
  </div>

  <script>
    const products = [
      89.00, 12.50, 45.00, 110.00,
      7.99, 150.00, 22.00, 95.00,
      33.00, 64.00, 18.90, 210.00
    ];

    let cart = 0;

    function render() {
      const container = document.getElementById('products');
      
      products.forEach((price, i) => {
        const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `
          <div class="product-bottom">
            <span class="price">$${price.toFixed(2)}</span>
            <button class="add-btn" onclick="addToCart(${i})">Add to Cart</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function addToCart(index) {
      cart++;
      document.getElementById('cartCount').textContent = cart;
      
      const badge = document.getElementById('cartCount');
      badge.style.transform = 'scale(1.2)';
      setTimeout(() => badge.style.transform = 'scale(1)', 150);
    }

    // Search filter
    document.getElementById('searchInput').addEventListener('input', function(e) {
      const val = e.target.value.toLowerCase();
      const cards = document.querySelectorAll('.product');
      
      cards.forEach((card, i) => {
        const price = products[i].toString();
        card.style.display = price.includes(val) || val === '' ? 'flex' : 'none';
      });
    });

    document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
